<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreditTracker Pro - Quản Lý Thẻ Tín Dụng Cá Nhân</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel CDN để biên dịch JSX trực tiếp trên trình duyệt -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Google API Client & Google Identity Services (Cho tính năng đồng bộ Google Drive) -->
  <script async defer src="https://apis.google.com/js/api.js"></script>
  <script async defer src="https://accounts.google.com/gsi/client"></script>
  
  <!-- Google Fonts - Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <div id="root"></div>

  <!-- Kịch bản React viết dưới dạng Babel JSX -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- INLINE SVG ICONS (Thay thế Lucide-React để tối ưu hóa Shared Hosting) ---
    const IconCreditCard = ({ size = 24, className = "" }) => (

    const IconPlus = ({ size = 24, className = "" }) => (

    const IconCalendar = ({ size = 24, className = "" }) => (

    const IconCheckCircle = ({ size = 24, className = "" }) => (

    const IconAlertCircle = ({ size = 24, className = "" }) => (

    const IconWallet = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4" />

        <path d="M18 12a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h4v-6Z" />
      </svg>
    );

    const IconEdit = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
        <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z" />
      </svg>
    );

    const IconTrash = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        <line x1="10" y1="11" x2="10" y2="17" />
        <line x1="14" y1="11" x2="14" y2="17" />
      </svg>
    );

    const IconX = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    );

    const IconBell = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
    );

    const IconVolume = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
      </svg>
    );

    const IconVolumeX = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <line x1="23" y1="9" x2="17" y2="15" />
        <line x1="17" y1="9" x2="23" y2="15" />
      </svg>
    );

    const IconCloud = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M17.5 19A3.5 3.5 0 0 0 21 15.5c0-2.79-2.54-4.5-5-4.5-.42-1.89-2-3-3.5-3A4 4 0 0 0 8.5 12c-2.42 0-4.5 1.72-4.5 4.5A3.5 3.5 0 0 0 7.5 19z" />
      </svg>
    );

    // --- CONFIGS & STYLES ---
    const formatCurrency = (amount) => {
      return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
    };

    const THEMES = [
      { id: 'dark', class: 'bg-gradient-to-br from-gray-900 to-gray-700' },
      { id: 'blue', class: 'bg-gradient-to-br from-blue-700 to-blue-500' },
      { id: 'purple', class: 'bg-gradient-to-br from-purple-700 to-pink-500' },
      { id: 'gold', class: 'bg-gradient-to-br from-yellow-600 to-yellow-400' },
      { id: 'green', class: 'bg-gradient-to-br from-emerald-600 to-teal-500' },
      { id: 'red', class: 'bg-gradient-to-br from-red-700 to-rose-500' },
    ];

    const INITIAL_CARDS = [
      {
        id: '1',
        name: 'Vietcombank Signature',
        imageUrl: '',
        theme: 'bg-gradient-to-br from-gray-900 to-gray-700',
        statementDay: 20,
        dueDay: 5,
        amountDue: 15500000,
        isPaid: false,
        actualPaymentDate: null,
        reminderDate: '',
        reminderTime: '',
        reminderSent: false
      },
      {
        id: '2',
        name: 'VIB Super Card',
        imageUrl: '',
        theme: 'bg-gradient-to-br from-blue-700 to-blue-500',
        statementDay: 10,
        dueDay: 25,
        amountDue: 4200000,
        isPaid: true,
        actualPaymentDate: '2026-05-20',
        reminderDate: '',
        reminderTime: '',
        reminderSent: false
      }
    ];

    // --- SOUND NOTIFICATION ---
    const playNotificationSound = () => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(587.33, ctx.currentTime);
        gain1.gain.setValueAtTime(0.08, ctx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc1.start(ctx.currentTime);
        osc1.stop(ctx.currentTime + 0.15);

        setTimeout(() => {
          const osc2 = ctx.createOscillator();
          const gain2 = ctx.createGain();
          osc2.connect(gain2);
          gain2.connect(ctx.destination);
          osc2.type = 'sine';
          osc2.frequency.setValueAtTime(880, ctx.currentTime);
          gain2.gain.setValueAtTime(0.08, ctx.currentTime);
          gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
          osc2.start(ctx.currentTime);
          osc2.stop(ctx.currentTime + 0.25);
        }, 150);
      } catch (e) {
        console.warn("Không thể kích hoạt âm báo tự động:", e);
      }
    };

    // --- REUSABLE MODAL COMPONENT ---
    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm transition-opacity">
          <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in-95 duration-150">
            <div className="flex justify-between items-center p-5 border-b border-gray-100">
              <h3 className="text-xl font-bold text-gray-800">{title}</h3>
              <button onClick={onClose} className="p-1.5 rounded-full hover:bg-gray-100 text-gray-500 transition-colors">
                <IconX size={20} />
              </button>
            </div>
            <div className="p-5 overflow-y-auto">
              {children}
            </div>
          </div>
        </div>
      );
    };

    // --- MAIN APP COMPONENT ---
    function App() {
      // Tải dữ liệu thẻ
      const [cards, setCards] = useState(() => {
        const savedCards = localStorage.getItem('credittracker_cards');
        return savedCards ? JSON.parse(savedCards) : INITIAL_CARDS;
      });

      // Tải cấu hình API Google (Nếu có)
      const [googleConfig, setGoogleConfig] = useState(() => {
        const savedConfig = localStorage.getItem('credittracker_google_config');
        return savedConfig ? JSON.parse(savedConfig) : { clientId: '', apiKey: '' };
      });
      
      const [notifications, setNotifications] = useState([]);
      const [isSoundEnabled, setIsSoundEnabled] = useState(true);
      
      // Modal States
      const [isCardModalOpen, setIsCardModalOpen] = useState(false);
      const [isPaymentModalOpen, setIsPaymentModalOpen] = useState(false);
      const [isStatementModalOpen, setIsStatementModalOpen] = useState(false);
      const [isCloudModalOpen, setIsCloudModalOpen] = useState(false);
      
      // Active Selection States
      const [editingCard, setEditingCard] = useState(null);
      const [selectedCard, setSelectedCard] = useState(null);
      const [paymentDate, setPaymentDate] = useState(new Date().toISOString().split('T')[0]);
      const [newStatementAmount, setNewStatementAmount] = useState('');
      
      // Google API State
      const [googleAccessToken, setGoogleAccessToken] = useState(null);
      const [googleUserEmail, setGoogleUserEmail] = useState(null);
      const [cloudStatus, setCloudStatus] = useState('Chưa kết nối');
      const [isCloudLoading, setIsCloudLoading] = useState(false);
      const tokenClientRef = useRef(null);

      // Form Input State
      const [cardForm, setCardForm] = useState({
        name: '', imageUrl: '', theme: THEMES[0].class, statementDay: '', dueDay: '', reminderDate: '', reminderTime: ''
      });

      // Lưu trữ cục bộ
      useEffect(() => {
        localStorage.setItem('credittracker_cards', JSON.stringify(cards));
      }, [cards]);

      // Lưu cấu hình Google Drive Client ID / API Key
      useEffect(() => {
        localStorage.setItem('credittracker_google_config', JSON.stringify(googleConfig));
      }, [googleConfig]);

      // --- TRÌNH BÁO THỨC HẸN GIỜ ---
      useEffect(() => {
        const checkReminders = () => {
          const now = new Date();
          const currentDate = now.toISOString().split('T')[0];
          const currentHour = now.getHours().toString().padStart(2, '0');
          const currentMinute = now.getMinutes().toString().padStart(2, '0');
          const currentTime = `${currentHour}:${currentMinute}`;

          let isUpdated = false;
          const updatedCards = cards.map(card => {
            if (
              !card.isPaid &&
              card.reminderDate === currentDate &&
              card.reminderTime === currentTime &&
              !card.reminderSent
            ) {
              if (isSoundEnabled) {
                playNotificationSound();
              }

              setNotifications(prev => [
                ...prev,
                {
                  id: Date.now().toString() + Math.random(),
                  cardName: card.name,
                  amount: card.amountDue,
                  message: `Đến giờ thanh toán thẻ ${card.name}!`
                }
              ]);
              
              isUpdated = true;
              return { ...card, reminderSent: true };
            }
            return card;
          });

          if (isUpdated) {
            setCards(updatedCards);
          }
        };

        const intervalId = setInterval(checkReminders, 10000);
        return () => clearInterval(intervalId);
      }, [cards, isSoundEnabled]);

      // --- TÍCH HỢP GOOGLE DRIVE SYNC ---
      
      // Khởi chạy Google client (GAPI & GIS)
      useEffect(() => {
        if (!googleConfig.clientId || !googleConfig.apiKey) return;

        const initGapi = () => {
          gapi.client.init({
            apiKey: googleConfig.apiKey,
            discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
          }).then(() => {
            setCloudStatus('Sẵn sàng kết nối');
          }).catch(err => {
            console.error("Lỗi khởi tạo GAPI:", err);
            setCloudStatus('Lỗi cấu hình API Google');
          });
        };

        const loadGapi = () => {
          gapi.load('client', initGapi);
        };

        // Khởi tạo Identity Client Token
        try {
          tokenClientRef.current = google.accounts.oauth2.initTokenClient({
            client_id: googleConfig.clientId,
            scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email',
            callback: (resp) => {
              if (resp.error !== undefined) {
                setCloudStatus('Lỗi xác thực Google');
                return;
              }
              setGoogleAccessToken(resp.access_token);
              setCloudStatus('Đã đăng nhập Google');
              fetchUserProfile(resp.access_token);
            },
          });
          loadGapi();
        } catch (e) {
          console.error("Lỗi khởi tạo GIS:", e);
        }
      }, [googleConfig.clientId, googleConfig.apiKey]);

      const fetchUserProfile = (token) => {
        fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
          headers: { Authorization: `Bearer ${token}` }
        })
        .then(res => res.json())
        .then(data => {
          if (data.email) setGoogleUserEmail(data.email);
        })
        .catch(err => console.error("Không thể lấy thông tin User:", err));
      };

      const handleGoogleSignIn = () => {
        if (!tokenClientRef.current) {
          alert("Vui lòng điền thông tin Client ID và API Key trước!");
          return;
        }
        tokenClientRef.current.requestAccessToken({ prompt: 'consent' });
      };

      const handleGoogleSignOut = () => {
        if (googleAccessToken) {
          google.accounts.oauth2.revoke(googleAccessToken);
        }
        setGoogleAccessToken(null);
        setGoogleUserEmail(null);
        setCloudStatus('Sẵn sàng kết nối');
      };

      // ĐỒNG BỘ: ĐẨY LÊN GOOGLE DRIVE (Sao lưu)
      const backupToDrive = async () => {
        if (!googleAccessToken) {
          alert("Vui lòng đăng nhập Google Drive trước!");
          return;
        }
        setIsCloudLoading(true);
        setCloudStatus('Đang sao lưu...');

        try {
          // Tìm xem tệp đã tồn tại chưa
          const listResponse = await gapi.client.drive.files.list({
            q: "name = 'credittracker_backup.json' and trashed = false",
            fields: 'files(id)',
            spaces: 'drive'
          });

          const files = listResponse.result.files;
          const fileContent = JSON.stringify({ cards, updatedAt: new Date().toISOString() });
          const fileMetadata = { name: 'credittracker_backup.json', mimeType: 'application/json' };

          if (files && files.length > 0) {
            // Cập nhật tệp cũ đã tồn tại
            const fileId = files[0].id;
            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
              method: 'PATCH',
              headers: {
                Authorization: `Bearer ${googleAccessToken}`,
                'Content-Type': 'application/json',
              },
              body: fileContent
            });
          } else {
            // Tạo mới tệp sao lưu trên Drive
            const metadataResponse = await gapi.client.drive.files.create({
              resource: fileMetadata,
              fields: 'id'
            });
            const newFileId = metadataResponse.result.id;

            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${newFileId}?uploadType=media`, {
              method: 'PATCH',
              headers: {
                Authorization: `Bearer ${googleAccessToken}`,
                'Content-Type': 'application/json',
              },
              body: fileContent
            });
          }

          setCloudStatus('Sao lưu thành công!');
          alert("Sao lưu dữ liệu lên Google Drive thành công!");
        } catch (error) {
          console.error("Lỗi đồng bộ sao lưu:", error);
          setCloudStatus('Sao lưu thất bại');
          alert("Sao lưu thất bại, vui lòng đăng nhập lại và thử lại.");
        } finally {
          setIsCloudLoading(false);
        }
      };

      // ĐỒNG BỘ: TẢI VỀ TỪ GOOGLE DRIVE (Khôi phục)
      const restoreFromDrive = async () => {
        if (!googleAccessToken) {
          alert("Vui lòng đăng nhập Google Drive trước!");
          return;
        }
        setIsCloudLoading(true);
        setCloudStatus('Đang tải dữ liệu...');

        try {
          const listResponse = await gapi.client.drive.files.list({
            q: "name = 'credittracker_backup.json' and trashed = false",
            fields: 'files(id)',
            spaces: 'drive'
          });

          const files = listResponse.result.files;
          if (files && files.length > 0) {
            const fileId = files[0].id;
            const contentResponse = await gapi.client.drive.files.get({
              fileId: fileId,
              alt: 'media'
            });

            const backupData = contentResponse.result;
            if (backupData && backupData.cards) {
              if (window.confirm(`Tìm thấy bản sao lưu trên Drive. Bạn có muốn khôi phục và ghi đè toàn bộ dữ liệu hiện tại trên thiết bị này?`)) {
                setCards(backupData.cards);
                setCloudStatus('Khôi phục thành công!');
                alert("Khôi phục thành công! Trang sẽ cập nhật dữ liệu mới.");
              }
            } else {
              alert("File sao lưu rỗng hoặc sai định dạng.");
            }
          } else {
            alert("Không tìm thấy tệp sao lưu nào của ứng dụng trên Google Drive!");
            setCloudStatus('Không có tệp sao lưu');
          }
        } catch (error) {
          console.error("Lỗi khôi phục:", error);
          setCloudStatus('Khôi phục thất bại');
          alert("Không thể khôi phục dữ liệu từ đám mây.");
        } finally {
          setIsCloudLoading(false);
        }
      };

      // Tính tổng tiền nợ và tiền đã thanh toán
      const totalDue = cards.filter(c => !c.isPaid).reduce((sum, c) => sum + Number(c.amountDue || 0), 0);
      const totalPaid = cards.filter(c => c.isPaid).reduce((sum, c) => sum + Number(c.amountDue || 0), 0);

      // --- EVENT HANDLERS ---
      const handleOpenAddCard = () => {
        setEditingCard(null);
        setCardForm({ name: '', imageUrl: '', theme: THEMES[0].class, statementDay: '', dueDay: '', reminderDate: '', reminderTime: '' });
        setIsCardModalOpen(true);
      };

      const handleOpenEditCard = (card) => {
        setEditingCard(card);
        setCardForm({ ...card });
        setIsCardModalOpen(true);
      };

      const handleSaveCard = (e) => {
        e.preventDefault();
        if (editingCard) {
          setCards(cards.map(c => c.id === editingCard.id ? { ...c, ...cardForm } : c));
        } else {
          const newCard = {
            ...cardForm,
            id: Date.now().toString(),
            amountDue: 0,
            isPaid: false,
            actualPaymentDate: null,
            reminderSent: false
          };
          setCards([...cards, newCard]);
        }
        setIsCardModalOpen(false);
      };

      const handleDeleteCard = (id) => {
        if (window.confirm('Bạn có chắc muốn xóa thẻ này? Mọi dữ liệu sẽ mất.')) {
          setCards(cards.filter(c => c.id !== id));
        }
      };

      const handleOpenPayment = (card) => {
        setSelectedCard(card);
        setPaymentDate(new Date().toISOString().split('T')[0]);
        setIsPaymentModalOpen(true);
      };

      const handleConfirmPayment = (e) => {
        e.preventDefault();
        setCards(cards.map(c => 
          c.id === selectedCard.id 
            ? { ...c, isPaid: true, actualPaymentDate: paymentDate } 
            : c
        ));
        setIsPaymentModalOpen(false);
      };

            isOpen={isStatementModalOpen} 
            onClose={() => setIsStatementModalOpen(false)} 
            title="Kỳ sao kê mới"
          >
            {selectedCard && (
              <form onSubmit={handleConfirmStatement} className="space-y-4">
                <p className="text-gray-500 text-xs leading-relaxed">
                  Nhập số tiền phát sinh mới cho thẻ <strong>{selectedCard.name}</strong>. Kỳ cũ sẽ được đóng lại, chuyển trạng thái thẻ về "Chưa thanh toán" và xóa báo thức cũ.
                </p>
                
                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Dư nợ sao kê mới (VNĐ)</label>
                  <input 
                    required
                    type="number" 
                    min="0"
                    placeholder="VD: 12000000"
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-lg font-extrabold text-gray-900"
                    value={newStatementAmount}
                    onChange={e => setNewStatementAmount(e.target.value)}
                  />
                </div>

                <div className="pt-4 border-t flex justify-end gap-2">
                  <button 
                    type="button" 
                    onClick={() => setIsStatementModalOpen(false)}
                    className="px-4 py-2 text-xs text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-bold"
                  >
                    Hủy bỏ
                  </button>
                  <button 
                    type="submit"
                    className="px-4 py-2 text-xs text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg font-bold"
                  >
                    Xác nhận dư nợ mới
                  </button>
                </div>
              </form>
            )}
          </Modal>

        </div>
      );
    }

    // Gắn kết ứng dụng React lên DOM
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
