  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Kịch bản React viết dưới dạng Babel JSX (Có hỗ trợ Module Import) -->
  <script type="text/babel" data-type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "firebase/auth";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "firebase/firestore";

    // --- CẤU HÌNH CLOUD DATABASE (Đã được điền cố định thông tin của bạn) ---
    const firebaseConfig = {
      apiKey: "AIzaSyCsHSGwOXOs4Ah89mYCVpL13PX_nvIp3P4",
      authDomain: "credit-791a3.firebaseapp.com",
      projectId: "credit-791a3",
      storageBucket: "credit-791a3.firebasestorage.app",
      messagingSenderId: "633322726523",
      appId: "1:633322726523:web:ebf19d71d582a150beaede",
      measurementId: "G-48SHGFHSW9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // Sử dụng ID ứng dụng cố định để lưu trữ trong Firestore công khai của bạn

    const { useState, useEffect } = React;

    // --- INLINE SVG ICONS ---
    const IconCreditCard = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>

    const IconCheckCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
        <polyline points="22 4 12 14.01 9 11.01" />
      </svg>
    );

    const IconAlertCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
    );

    const IconWallet = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4" />
        <path d="M4 6v12c0 1.1.9 2 2 2h14v-4" />
        <path d="M18 12a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h4v-6Z" />
      </svg>
    );

    const IconEdit = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
        <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z" />
      </svg>
    );

    const IconTrash = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        <line x1="10" y1="11" x2="10" y2="17" />
        <line x1="14" y1="11" x2="14" y2="17" />
      </svg>
    );

    const IconX = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    );

    const IconBell = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
    );

    const IconVolume = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
      </svg>
    );

    const IconVolumeX = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <line x1="23" y1="9" x2="17" y2="15" />
        <line x1="17" y1="9" x2="23" y2="15" />
      </svg>
    );

    const IconCloudSync = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242" />
        <path d="M12 12v9" />
        <path d="m8 17 4-4 4 4" />
      </svg>
    );

    const IconLoader = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`}>
        <line x1="12" y1="2" x2="12" y2="6" />
        <line x1="12" y1="18" x2="12" y2="22" />
        <line x1="4.93" y1="4.93" x2="7.76" y2="7.76" />
        <line x1="16.24" y1="16.24" x2="19.07" y2="19.07" />
        <line x1="2" y1="12" x2="6" y2="12" />
        <line x1="18" y1="12" x2="22" y2="12" />
        <line x1="4.93" y1="19.07" x2="7.76" y2="16.24" />
        <line x1="16.24" y1="7.76" x2="19.07" y2="4.93" />
      </svg>
    );

    // --- CONFIGS & STYLES ---
    const formatCurrency = (amount) => {
      return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
    };

    const THEMES = [
      { id: 'dark', class: 'bg-gradient-to-br from-gray-900 to-gray-700' },
      { id: 'blue', class: 'bg-gradient-to-br from-blue-700 to-blue-500' },
      { id: 'purple', class: 'bg-gradient-to-br from-purple-700 to-pink-500' },
      { id: 'gold', class: 'bg-gradient-to-br from-yellow-600 to-yellow-400' },
      { id: 'green', class: 'bg-gradient-to-br from-emerald-600 to-teal-500' },
      { id: 'red', class: 'bg-gradient-to-br from-red-700 to-rose-500' },
    ];

    // --- SOUND NOTIFICATION ---
    const playNotificationSound = () => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        // Tiếng bíp thứ nhất (D5)
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(587.33, ctx.currentTime);
        gain1.gain.setValueAtTime(0.08, ctx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc1.start(ctx.currentTime);
        osc1.stop(ctx.currentTime + 0.15);

        // Tiếng bíp thứ hai (A5)
        setTimeout(() => {
          const osc2 = ctx.createOscillator();
          const gain2 = ctx.createGain();
          osc2.connect(gain2);
          gain2.connect(ctx.destination);
          osc2.type = 'sine';
          osc2.frequency.setValueAtTime(880, ctx.currentTime);
          gain2.gain.setValueAtTime(0.08, ctx.currentTime);
          gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
          osc2.start(ctx.currentTime);
          osc2.stop(ctx.currentTime + 0.25);
        }, 150);

      } catch (e) {
        console.warn("Không thể kích hoạt âm báo tự động:", e);
      }
    };

    // --- REUSABLE MODAL COMPONENT ---
    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm transition-opacity">
          <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in-95 duration-150">
            <div className="flex justify-between items-center p-5 border-b border-gray-100">
              <h3 className="text-xl font-bold text-gray-800">{title}</h3>
              <button onClick={onClose} className="p-1.5 rounded-full hover:bg-gray-100 text-gray-500 transition-colors">
                <IconX size={20} />
              </button>
            </div>
            <div className="p-5 overflow-y-auto">
              {children}
            </div>
          </div>
        </div>
      );
    };

    // --- MAIN APP COMPONENT ---
    function App() {
      const [cards, setCards] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [user, setUser] = useState(null);
      const [authError, setAuthError] = useState(null);
      
      const [notifications, setNotifications] = useState([]);
      const [isSoundEnabled, setIsSoundEnabled] = useState(true);
      
      // Modal States
      const [isCardModalOpen, setIsCardModalOpen] = useState(false);
      const [isPaymentModalOpen, setIsPaymentModalOpen] = useState(false);
      const [isStatementModalOpen, setIsStatementModalOpen] = useState(false);
      
      // Active Selection States
      const [editingCard, setEditingCard] = useState(null);
      const [selectedCard, setSelectedCard] = useState(null);
      const [paymentDate, setPaymentDate] = useState(new Date().toISOString().split('T')[0]);
      const [newStatementAmount, setNewStatementAmount] = useState('');
      
      // Form Input State
      const [cardForm, setCardForm] = useState({
        name: '', imageUrl: '', theme: THEMES[0].class, statementDay: '', dueDay: '', reminderDate: '', reminderTime: ''
      });

      // 1. Khởi tạo xác thực (Bảo mật xử lý ngoại lệ Custom Token Mismatch)
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              try {
                // Thử đăng nhập bằng Custom Token từ Sandbox
                await signInWithCustomToken(auth, __initial_auth_token);
              } catch (tokenError) {
                // Nếu mismatch do cấu hình Firebase cá nhân của user, chuyển hướng sang đăng nhập ẩn danh ngay
                console.warn("Lỗi Custom Token, tự động chuyển sang Đăng nhập Ẩn danh:", tokenError);
                await signInAnonymously(auth);
              }
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Lỗi đăng nhập Firebase:", error);
            setAuthError(error.message);
            setIsLoading(false);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
        });
        return () => unsubscribe();
      }, []);

      // 2. Lắng nghe dữ liệu Live Sync từ Firebase Cloud Database
      useEffect(() => {
        if (!user) return;
        
        const cardsRef = collection(db, 'artifacts', appId, 'public', 'data', 'cards');
        const unsubscribe = onSnapshot(cardsRef, (snapshot) => {
          const cardsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          
          // Sắp xếp: thẻ chưa trả nợ lên trước
          cardsData.sort((a, b) => (a.isPaid === b.isPaid ? 0 : a.isPaid ? 1 : -1));
          
          setCards(cardsData);
          setIsLoading(false);
        }, (error) => {
          console.error("Lỗi tải dữ liệu Cloud:", error);
          setAuthError("Không thể lấy dữ liệu. Hãy đảm bảo bạn đã bật 'Firestore Database' và cấu hình Rules cho phép đọc/ghi trên Firebase Console.");
          setIsLoading(false);
        });

        return () => unsubscribe();
      }, [user]);

      // 3. Trình ngầm kiểm tra báo thức và giờ hẹn thanh toán
      useEffect(() => {
        const checkReminders = () => {
          if (!user || cards.length === 0) return;
          
          const now = new Date();
          const currentDate = now.toISOString().split('T')[0];
          const currentHour = now.getHours().toString().padStart(2, '0');
          const currentMinute = now.getMinutes().toString().padStart(2, '0');
          const currentTime = `${currentHour}:${currentMinute}`;

          cards.forEach(card => {
            if (
              !card.isPaid &&
              card.reminderDate === currentDate &&
              card.reminderTime === currentTime &&
              !card.reminderSent
            ) {
              if (isSoundEnabled) {
                playNotificationSound();
              }

              // Đưa thông báo lên màn hình
              setNotifications(prev => [
                ...prev,
                {
                  id: Date.now().toString() + Math.random(),
                  cardName: card.name,
                  amount: card.amountDue,
                  message: `Đến giờ thanh toán thẻ ${card.name}!`
                }
              ]);
              
              // Cập nhật trạng thái "đã báo" lên Cloud
              const cardRef = doc(db, 'artifacts', appId, 'public', 'data', 'cards', card.id);
              setDoc(cardRef, { reminderSent: true }, { merge: true });
            }
          });
        };

        const intervalId = setInterval(checkReminders, 10000); // 10 giây quét 1 lần
        return () => clearInterval(intervalId);
      }, [cards, isSoundEnabled, user]);

      // Tính toán dữ liệu thống kê tổng thể
      const totalDue = cards.filter(c => !c.isPaid).reduce((sum, c) => sum + Number(c.amountDue || 0), 0);
      const totalPaid = cards.filter(c => c.isPaid).reduce((sum, c) => sum + Number(c.amountDue || 0), 0);

      // --- EVENT HANDLERS ---
      const handleOpenAddCard = () => {
        setEditingCard(null);
        setCardForm({ name: '', imageUrl: '', theme: THEMES[0].class, statementDay: '', dueDay: '', reminderDate: '', reminderTime: '' });
        setIsCardModalOpen(true);
      };

      const handleOpenEditCard = (card) => {
        setEditingCard(card);
        setCardForm({ ...card });
        setIsCardModalOpen(true);
      };

      const handleSaveCard = async (e) => {
        e.preventDefault();
        if (!user) return;

        const cardId = editingCard ? editingCard.id : Date.now().toString();
        const cardData = editingCard 
          ? { ...editingCard, ...cardForm } 
          : { 
              ...cardForm, 
              amountDue: 0, 
              isPaid: false, 
              actualPaymentDate: null, 
              reminderSent: false 
            };

        // Lưu trực tiếp lên Cloud
        const cardRef = doc(db, 'artifacts', appId, 'public', 'data', 'cards', cardId);
        await setDoc(cardRef, cardData);
        
        setIsCardModalOpen(false);
      };

      const handleDeleteCard = async (id) => {
        if (window.confirm('Bạn có thực sự muốn xóa thẻ này? Mọi dữ liệu sẽ bị xóa cho tất cả người dùng.')) {
          if (!user) return;
          const cardRef = doc(db, 'artifacts', appId, 'public', 'data', 'cards', id);
          await deleteDoc(cardRef);
        }
      };

      const handleOpenPayment = (card) => {
        setSelectedCard(card);
        setPaymentDate(new Date().toISOString().split('T')[0]);
        setIsPaymentModalOpen(true);
      };

      const handleConfirmPayment = async (e) => {
        e.preventDefault();
        if (!user || !selectedCard) return;

        const cardRef = doc(db, 'artifacts', appId, 'public', 'data', 'cards', selectedCard.id);
        await setDoc(cardRef, { 
          isPaid: true, 
          actualPaymentDate: paymentDate 
        }, { merge: true });
        
        setIsPaymentModalOpen(false);
      };

      const handleOpenStatement = (card) => {
        setSelectedCard(card);
        setNewStatementAmount(card.amountDue || '');
        setIsStatementModalOpen(true);
      };

      const handleConfirmStatement = async (e) => {
        e.preventDefault();
        if (!user || !selectedCard) return;

        const cardRef = doc(db, 'artifacts', appId, 'public', 'data', 'cards', selectedCard.id);
        await setDoc(cardRef, {
          amountDue: Number(newStatementAmount),
          isPaid: false,
          actualPaymentDate: null,
          reminderSent: false
        }, { merge: true });

        setIsStatementModalOpen(false);
      };

      const removeNotification = (id) => {
        setNotifications(notifications.filter(n => n.id !== id));
      };

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center gap-4 bg-gray-50 text-indigo-600">
             <IconLoader size={48} />
             <p className="font-semibold text-gray-500 animate-pulse text-center px-4">
                Đang kết nối Cloud của bạn: <strong className="text-gray-700 block mt-1">credit-791a3</strong>
             </p>
          </div>
        )
      }

      if (authError) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-red-50 text-red-700 text-center">
            <IconAlertCircle size={48} className="mb-4" />
            <h1 className="text-xl font-bold mb-2">Lỗi cấu hình Firebase</h1>
            <p className="max-w-md text-sm text-red-600 mb-4">{authError}</p>
            <div className="text-left bg-white p-4 rounded-xl border border-red-100 max-w-lg text-xs text-gray-600 space-y-2">
              <p className="font-bold text-gray-800">Các bước kiểm tra để ứng dụng hoạt động:</p>
              <p>1. Hãy truy cập vào <strong>Firebase Console</strong> dự án <code>credit-791a3</code>.</p>
              <p>2. Chọn menu <strong>Authentication</strong> &gt; tab <strong>Sign-in method</strong> &gt; Bấm nút <strong>Add new provider</strong> &gt; Chọn <strong>Anonymous (Ẩn danh)</strong> và bấm Enable.</p>
              <p>3. Chọn menu <strong>Firestore Database</strong> &gt; Tạo database (nhớ chọn đúng vị trí) &gt; Chuyển sang tab <strong>Rules</strong> và thay đổi cấu hình thành:</p>
              <pre className="bg-gray-100 p-2 rounded text-[10px] overflow-x-auto text-indigo-600">
{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if true;
    }
  }
}`}
              </pre>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans relative">
          
          {/* Hệ thống Toast Alerts góc phải */}
          <div className="fixed top-20 right-4 z-50 flex flex-col gap-3 pointer-events-none max-w-sm w-full px-4 sm:px-0">
            {notifications.map(note => (
              <div 
                key={note.id} 
                className="bg-white border-l-4 border-indigo-600 shadow-2xl rounded-r-xl p-4 w-full pointer-events-auto relative border-y border-r border-gray-100 flex flex-col"
              >
                <button 
                  onClick={() => removeNotification(note.id)} 
                  className="absolute top-2 right-2 p-1 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-full transition-colors"
                >
                  <IconX size={16} />
                </button>
                <div className="flex items-center gap-2 text-indigo-600 font-bold mb-1">
                  <IconBell size={18} className="animate-bounce" />
                  <span>BÁO THỨC THANH TOÁN!</span>
                </div>
                <p className="text-sm text-gray-600 mt-1">{note.message}</p>
                <p className="text-sm font-bold text-gray-950 mt-2">Cần trả: {formatCurrency(note.amount)}</p>
              </div>
            ))}
          </div>

          {/* Header */}
          <header className="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
            <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2 text-indigo-600">
                <IconCreditCard size={28} className="text-indigo-600" />
                <h1 className="text-xl font-extrabold tracking-tight hidden sm:block">CreditTracker Pro</h1>
              </div>
              
              <div className="flex items-center gap-2.5">
                {/* Bật/Tắt âm thanh báo */}
                <button 
                  onClick={() => setIsSoundEnabled(!isSoundEnabled)}
                  className={`p-2 rounded-lg border transition-all flex items-center gap-1.5 text-xs font-semibold ${isSoundEnabled ? 'bg-indigo-50 text-indigo-700 border-indigo-200 hover:bg-indigo-100' : 'bg-gray-100 text-gray-500 border-gray-200 hover:bg-gray-200'}`}
                >
                  {isSoundEnabled ? <IconVolume size={16} /> : <IconVolumeX size={16} />}
                  <span className="hidden md:inline">{isSoundEnabled ? "Đang bật âm" : "Đã tắt âm"}</span>
                </button>

                <button 
                  onClick={handleOpenAddCard}
                  className="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 sm:px-4 rounded-lg font-bold transition-colors shadow-sm text-sm"
                >
                  <IconPlus size={16} />
                  <span>Thêm thẻ mới</span>
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-8">
            
            {/* Widget Tổng Quan */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
              <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-5">
                <div className="w-14 h-14 rounded-full bg-rose-50 flex items-center justify-center text-rose-600 flex-shrink-0 border border-rose-100">
                  <IconAlertCircle size={28} />
                </div>
                <div>
                  <p className="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-1">Dư nợ chưa thanh toán</p>
                  <h2 className="text-3xl font-extrabold text-gray-900">{formatCurrency(totalDue)}</h2>
                </div>
              </div>
              
              <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-5">
                <div className="w-14 h-14 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-600 flex-shrink-0 border border-emerald-100">
                  <IconCheckCircle size={28} />
                </div>
                <div>
                  <p className="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-1">Đã thanh toán kỳ này</p>
                  <h2 className="text-3xl font-extrabold text-gray-900">{formatCurrency(totalPaid)}</h2>
                </div>
              </div>
            </div>

            {/* Tiêu đề danh sách */}
            <div className="mb-6 flex flex-col sm:flex-row justify-between sm:items-center gap-3">
              <h2 className="text-lg font-bold text-gray-800">Danh sách thẻ tín dụng</h2>
              <span className="text-[11px] text-emerald-700 bg-emerald-100/80 px-3 py-1.5 rounded-full font-bold flex items-center gap-1.5 w-fit border border-emerald-200 shadow-sm" title="Kết nối trực tiếp tới credit-791a3">
                <IconCloudSync size={14} className="animate-pulse" /> 
                Live Sync: credit-791a3
              </span>
            </div>

            {/* Danh sách thẻ */}
            {cards.length === 0 ? (
              <div className="text-center py-16 bg-white rounded-2xl border border-dashed border-gray-300">
                <IconCreditCard size={48} className="mx-auto text-gray-300 mb-4" />
                <h3 className="text-lg font-bold text-gray-900 mb-1">Chưa có thẻ nào</h3>
                <p className="text-gray-500 mb-6 text-sm max-w-sm mx-auto">Vui lòng bấm Thêm thẻ mới ở góc trên bên phải để bắt đầu thiết lập thông tin. Dữ liệu sẽ lập tiếp được đồng bộ trực tiếp lên Firebase Cloud của bạn.</p>
                <button onClick={handleOpenAddCard} className="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-indigo-700 transition-colors shadow-sm">
                  + Tạo thẻ đầu tiên
                </button>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {cards.map(card => (
                  <div key={card.id} className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex flex-col hover:shadow-md transition-shadow relative">
                    
                    {/* Minh họa thẻ tín dụng */}
                    <div 
                      className={`w-full h-44 rounded-2xl p-5 flex flex-col justify-between text-white shadow-md relative overflow-hidden mb-5 ${card.theme}`}
                      style={card.imageUrl ? { backgroundImage: `url(${card.imageUrl})`, backgroundSize: 'cover', backgroundPosition: 'center' } : {}}
                    >
                      {card.imageUrl && <div className="absolute inset-0 bg-black/40 z-0"></div>}
                      
                      <div className="relative z-10 flex justify-between items-start">
                        <span className="font-bold text-lg tracking-wide line-clamp-1">{card.name}</span>
                        <IconWallet className="opacity-80" size={20} />
                      </div>
                      
                      <div className="relative z-10">
                        <div className="text-white/75 text-[10px] uppercase tracking-wider mb-0.5 font-semibold">Dư nợ sao kê kỳ này</div>
                        <div className="text-2xl font-extrabold tracking-tight">
                          {formatCurrency(card.amountDue || 0)}
                        </div>
                      </div>
                    </div>

                    {/* Thông tin thẻ */}
                    <div className="flex-1 flex flex-col">
                      <div className="grid grid-cols-2 gap-3 mb-4">
                        <div className="bg-gray-50 p-3 rounded-xl border border-gray-100">
                          <div className="text-[11px] text-gray-400 font-semibold flex items-center gap-1 mb-1">
                            <IconCalendar size={13} /> Ngày sao kê
                          </div>
                          <div className="font-bold text-gray-900 text-sm">Hàng tháng {card.statementDay}</div>
                        </div>
                        <div className="bg-gray-50 p-3 rounded-xl border border-gray-100">
                          <div className="text-[11px] text-gray-400 font-semibold flex items-center gap-1 mb-1">
                            <IconAlertCircle size={13} className={card.isPaid ? 'text-gray-400' : 'text-orange-500'}/> Ngày đến hạn
                          </div>
                          <div className="font-bold text-gray-900 text-sm">Hàng tháng {card.dueDay}</div>
                        </div>
                      </div>

                      {/* Trạng thái thẻ */}
                      <div className="mb-5 flex-1">
                        {card.isPaid ? (
                          <div className="bg-emerald-50/60 border border-emerald-100 rounded-xl p-3 flex items-start gap-3 text-emerald-800">
                            <IconCheckCircle className="mt-0.5 flex-shrink-0 text-emerald-600" size={18} />
                            <div>
                              <p className="font-bold text-xs uppercase tracking-wider">Đã hoàn tất thanh toán</p>
                              <p className="text-[11px] text-emerald-600 mt-0.5">Ngày thực tế: {card.actualPaymentDate ? new Date(card.actualPaymentDate).toLocaleDateString('vi-VN') : 'N/A'}</p>
                            </div>
                          </div>
                        ) : (
                          <div className="bg-orange-50/60 border border-orange-100 rounded-xl p-3 flex flex-col gap-2 text-orange-800">
                            <div className="flex items-start gap-3">
                              <IconAlertCircle className="mt-0.5 flex-shrink-0 text-orange-600" size={18} />
                              <div>
                                <p className="font-bold text-xs uppercase tracking-wider">Chưa thanh toán</p>
                                <p className="text-[11px] text-orange-600 mt-0.5">Vui lòng trả trước ngày {card.dueDay}</p>
                              </div>
                            </div>
                            {card.reminderDate && card.reminderTime && (
                              <div className="flex items-center gap-1.5 text-[11px] bg-orange-100 px-2 py-1 rounded-md mt-1 w-fit font-semibold text-orange-900">
                                <IconBell size={12} className={`text-orange-600 ${!card.reminderSent ? 'animate-pulse' : ''}`} />
                                {card.reminderSent ? 'Đã báo:' : 'Báo thức:'} {card.reminderTime} - {new Date(card.reminderDate).toLocaleDateString('vi-VN')}
                              </div>
                            )}
                          </div>
                        )}
                      </div>

                      {/* Nút hành động */}
                      <div className="flex gap-2 mt-auto">
                        {!card.isPaid ? (
                          <button 
                            onClick={() => handleOpenPayment(card)}
                            className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl text-xs font-bold transition-colors shadow-sm"
                          >
                            Xác nhận đã trả
                          </button>
                        ) : (
                          <button 
                            onClick={() => handleOpenStatement(card)}
                            className="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 py-2.5 rounded-xl text-xs font-bold transition-colors shadow-sm"
                          >
                            Kỳ sao kê mới
                          </button>
                        )}
                        
                        <div className="flex gap-1.5">
                          <button 
                            onClick={() => handleOpenEditCard(card)}
                            className="p-2.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl transition-colors"
                            title="Chỉnh sửa thẻ"
                          >
                            <IconEdit size={16} />
                          </button>
                          <button 
                            onClick={() => handleDeleteCard(card.id)}
                            className="p-2.5 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-xl transition-colors"
                            title="Xóa thẻ"
                          >
                            <IconTrash size={16} />
                          </button>
                        </div>
                      </div>
                    </div>

                  </div>
                ))}
              </div>
            )}
          </main>

          {/* --- CÁC MODALS POPUP --- */}

          {/* 1. Modal Thêm/Sửa Thẻ */}
          <Modal 
            isOpen={isCardModalOpen} 
            onClose={() => setIsCardModalOpen(false)} 
            title={editingCard ? "Chỉnh sửa thẻ" : "Thêm thẻ tín dụng"}
          >
            <form onSubmit={handleSaveCard} className="space-y-4">
              <div>
                <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Tên thẻ tín dụng</label>
                <input 
                  required
                  type="text" 
                  placeholder="VD: VPBank StepUp, Techcombank Visa..."
                  className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium"
                  value={cardForm.name}
                  onChange={e => setCardForm({...cardForm, name: e.target.value})}
                />
              </div>
              
              <div>
                <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Đường dẫn ảnh thẻ (URL - Tùy chọn)</label>
                <input 
                  type="url" 
                  placeholder="https://example.com/logo-card.jpg"
                  className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                  value={cardForm.imageUrl}
                  onChange={e => setCardForm({...cardForm, imageUrl: e.target.value})}
                />
                <p className="text-[10px] text-gray-400 mt-1">Để trống nếu bạn muốn dùng mẫu nền gradient có sẵn dưới đây.</p>
              </div>

              {!cardForm.imageUrl && (
                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Chọn mẫu màu thẻ</label>
                  <div className="flex gap-2 flex-wrap">
                    {THEMES.map(theme => (
                      <button
                        key={theme.id}
                        type="button"
                        className={`w-8 h-8 rounded-full shadow-sm ${theme.class} ${cardForm.theme === theme.class ? 'ring-[3px] ring-offset-2 ring-indigo-600' : 'opacity-75 hover:opacity-100'}`}
                        onClick={() => setCardForm({...cardForm, theme: theme.class})}
                      />
                    ))}
                  </div>
                </div>
              )}

              <div className="grid grid-cols-2 gap-4 border-t border-gray-100 pt-3">
                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Ngày sao kê (1 - 31)</label>
                  <input 
                    required
                    type="number" min="1" max="31"
                    placeholder="VD: 20"
                    className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold text-gray-900"
                    value={cardForm.statementDay}
                    onChange={e => setCardForm({...cardForm, statementDay: e.target.value})}
                  />
                </div>
                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Ngày đến hạn (1 - 31)</label>
                  <input 
                    required
                    type="number" min="1" max="31"
                    placeholder="VD: 5"
                    className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold text-gray-900"
                    value={cardForm.dueDay}
                    onChange={e => setCardForm({...cardForm, dueDay: e.target.value})}
                  />
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Ngày nhắc nhở (Tùy chọn)</label>
                  <input 
                    type="date"
                    className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-gray-700"
                    value={cardForm.reminderDate}
                    onChange={e => setCardForm({...cardForm, reminderDate: e.target.value})}
                  />
                </div>
                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Giờ nhắc nhở</label>
                  <input 
                    type="time"
                    className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-gray-700"
                    value={cardForm.reminderTime}
                    onChange={e => setCardForm({...cardForm, reminderTime: e.target.value})}
                  />
                </div>
              </div>

              <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl mt-4 transition-colors flex items-center justify-center gap-2">
                <IconCloudSync size={18} />
                {editingCard ? "Cập nhật dữ liệu Cloud" : "Lưu thẻ lên Cloud"}
              </button>
            </form>
          </Modal>

          {/* 2. Modal Xác nhận thanh toán */}
          <Modal
            isOpen={isPaymentModalOpen}
            onClose={() => setIsPaymentModalOpen(false)}
            title="Xác nhận thanh toán"
          >
            <form onSubmit={handleConfirmPayment} className="space-y-4">
              <div className="p-3 bg-blue-50 border border-blue-100 rounded-xl mb-4 text-sm text-blue-800">
                Bạn đang xác nhận đã thanh toán toàn bộ dư nợ cho thẻ: <br/> 
                <strong className="text-blue-900 text-base">{selectedCard?.name}</strong>
              </div>
              
              <div>
                <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Ngày bạn đã thanh toán</label>
                <input 
                  required
                  type="date"
                  className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                  value={paymentDate}
                  onChange={e => setPaymentDate(e.target.value)}
                />
              </div>

              <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl mt-4 transition-colors">
                Hoàn tất & Cập nhật
              </button>
            </form>
          </Modal>

          {/* 3. Modal Khởi tạo kỳ sao kê mới */}
          <Modal
            isOpen={isStatementModalOpen}
            onClose={() => setIsStatementModalOpen(false)}
            title="Bắt đầu kỳ sao kê mới"
          >
            <form onSubmit={handleConfirmStatement} className="space-y-4">
              <div className="p-3 bg-gray-50 border border-gray-200 rounded-xl mb-4 text-sm text-gray-700">
                Nhập số tiền dư nợ mới cho thẻ: <br/> 
                <strong className="text-gray-900 text-base">{selectedCard?.name}</strong>
              </div>
              
              <div>
                <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Dư nợ sao kê kỳ này (VNĐ)</label>
                <input 
                  required
                  type="number"
                  min="0"
                  placeholder="VD: 5000000"
                  className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-lg font-bold text-gray-900"
                  value={newStatementAmount}
                  onChange={e => setNewStatementAmount(e.target.value)}
                />
              </div>

              <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl mt-4 transition-colors">
                Lưu kỳ mới
              </button>
            </form>
          </Modal>

        </div>
      );
    }

    // Khởi chạy ứng dụng React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
